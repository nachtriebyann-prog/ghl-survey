<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilan Patrimonial - Novi Finance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%; padding: 40px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
    .header p { color: #666; font-size: 14px; }
    .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s ease; }
    .form-step { display: none; }
    .form-step.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 10px; color: #333; font-weight: 500; font-size: 14px; }
    input[type="text"], input[type="email"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .radio-group { display: flex; flex-direction: column; gap: 12px; }
    .radio-option { display: flex; align-items: center; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .radio-option:hover { border-color: #667eea; background: #f9f9ff; }
    .radio-option input[type="radio"] { margin-right: 12px; cursor: pointer; }
    .radio-option.selected { border-color: #667eea; background: #f0f4ff; }
    .buttons { display: flex; gap: 10px; margin-top: 30px; }
    button { flex: 1; padding: 12px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .error { background: #fee; color: #c00; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
    .success { background: #efe; color: #060; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
    .otp-input-group { display: flex; gap: 8px; margin-bottom: 20px; }
    .otp-input { width: 50px !important; height: 50px; text-align: center; font-size: 20px; font-weight: bold; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .trustbadges { display: flex; gap: 10px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; justify-content: center; font-size: 12px; color: #999; }
    .badge { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Bilan Patrimonial</h1>
      <p>Gratuitement et sans engagement</p>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <form id="surveyForm">
      <div id="error" class="error" style="display: none;"></div>
      <div id="success" class="success" style="display: none;"></div>
      <div class="form-step active" id="step1">
        <div class="form-group">
          <label for="firstName">Prénom</label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">Nom</label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="buttons">
          <button type="button" class="btn-primary" onclick="nextStep()">Suivant</button>
        </div>
      </div>
      <div class="form-step" id="step2">
        <div class="form-group">
          <label>Quel est votre principal projet en ce moment ?</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="surveyResponse" value="retirement" required>
              <span>Préparer ma retraite</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="surveyResponse" value="taxes" required>
              <span>Réduire mes impôts</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="surveyResponse" value="savings" required>
              <span>Épargner et finir d'investir mon argent</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="surveyResponse" value="realestate" required>
              <span>Investir dans l'immobilier</span>
            </label>
          </div>
        </div>
        <div class="buttons">
          <button type="button" class="btn-secondary" onclick="prevStep()">Retour</button>
          <button type="button" class="btn-primary" onclick="nextStep()">Suivant</button>
        </div>
      </div>
      <div class="form-step" id="step3">
        <div class="form-group">
          <label for="phone">Numéro de téléphone</label>
          <input type="tel" id="phone" name="phone" placeholder="+33712345678" required>
        </div>
        <button type="button" class="btn-primary" onclick="sendOTP()" id="sendOtpBtn">Envoyer le code OTP</button>
        <div id="otpSection" style="display: none; margin-top: 30px;">
          <div class="form-group">
            <label>Code OTP reçu par SMS</label>
            <div class="otp-input-group" id="otpInputs"></div>
          </div>
          <button type="button" class="btn-primary" onclick="verifyOTP()" id="verifyBtn">Valider</button>
        </div>
        <div class="buttons" style="margin-top: 20px;">
          <button type="button" class="btn-secondary" onclick="prevStep()">Retour</button>
        </div>
      </div>
      <div class="form-step" id="step4">
        <div style="text-align: center; padding: 40px 0;">
          <h2 style="color: #667eea; margin-bottom: 10px;">✓ Merci!</h2>
          <p style="color: #666;">Vos données ont été enregistrées avec succès.</p>
          <p style="color: #666; margin-top: 20px;">Un expert vous contactera rapidement.</p>
        </div>
      </div>
    </form>
    <div class="trustbadges">
      <div class="badge">✓ Gratuit</div>
      <div class="badge">✓ Sans engagement</div>
      <div class="badge">✓ Confidentiel</div>
    </div>
  </div>
  <script>
    let currentStep = 1, formData = {}, otpSent = false;
    document.addEventListener('change', e => {
      if(e.target.type === 'radio'){
        document.querySelectorAll('.radio-option').forEach(o=>o.classList.remove('selected'));
        e.target.closest('.radio-option').classList.add('selected');
      }
    });
    function updateProgress(){ document.getElementById('progressFill').style.width = (currentStep/4)*100+'%'; }
    function showStep(s){ document.querySelectorAll('.form-step').forEach(x=>x.classList.remove('active')); document.getElementById('step'+s).classList.add('active'); currentStep=s; updateProgress(); }
    function nextStep(){
      if(currentStep===1){
        formData.firstName=document.getElementById('firstName').value;
        formData.lastName=document.getElementById('lastName').value;
        formData.email=document.getElementById('email').value;
        if(!formData.firstName||!formData.lastName||!formData.email){ showError('Tous les champs sont requis'); return; }
      }else if(currentStep===2){
        formData.surveyResponse=document.querySelector('input[name="surveyResponse"]:checked')?.value;
        if(!formData.surveyResponse){ showError('Veuillez sélectionner une option'); return; }
      }
      showStep(currentStep+1);
    }
    function prevStep(){ showStep(currentStep-1); }
    async function sendOTP(){
      const phone=document.getElementById('phone').value;
      if(!phone){ showError('Veuillez entrer votre numéro'); return; }
      const btn=document.getElementById('sendOtpBtn');
      btn.disabled=true; btn.innerHTML='<span class="loading"></span>';
      try{
        const r=await fetch('/api/submit-form',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,formData})});
        const d=await r.json();
        if(!r.ok)throw new Error(d.error);
        otpSent=true; formData.phone=phone;
        document.getElementById('otpSection').style.display='block';
        createOtpInputs();
        showSuccess('Code OTP envoyé');
      }catch(e){ showError(e.message); }finally{ btn.disabled=false; btn.innerHTML='Envoyer le code OTP'; }
    }
    function createOtpInputs(){
      const c=document.getElementById('otpInputs');
      c.innerHTML='';
      for(let i=0;i<6;i++){
        const inp=document.createElement('input');
        inp.type='text'; inp.maxLength='1'; inp.className='otp-input';
        inp.addEventListener('input',e=>{if(e.target.value&&i<5)document.querySelectorAll('.otp-input')[i+1].focus();});
        c.appendChild(inp);
      }
    }
    async function verifyOTP(){
      const otp=Array.from(document.querySelectorAll('.otp-input')).map(i=>i.value).join('');
      if(otp.length!==6){ showError('Veuillez entrer 6 chiffres'); return; }
      const btn=document.getElementById('verifyBtn');
      btn.disabled=true; btn.innerHTML='<span class="loading"></span>';
      try{
        const r=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:formData.phone,otp})});
        const d=await r.json();
        if(!r.ok)throw new Error(d.error);
        showSuccess('Données enregistrées!');
        setTimeout(()=>showStep(4),500);
      }catch(e){ showError(e.message); }finally{ btn.disabled=false; btn.innerHTML='Valider'; }
    }
    function showError(m){ const e=document.getElementById('error'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); }
    function showSuccess(m){ const s=document.getElementById('success'); s.textContent=m; s.style.display='block'; setTimeout(()=>s.style.display='none',5000); }
    updateProgress();
  </script>
</body>
</html>
